<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 24" shape-rendering="crispEdges">
  <!-- 仮スプライト: 本物のドット絵 PNG (rider.png) を置くと差し替わる -->
  <!-- 後輪 -->
  <rect x="2" y="16" width="8" height="8" fill="#1a140e"/>
  <rect x="4" y="18" width="4" height="4" fill="#8d8d93"/>
  <rect x="5" y="19" width="2" height="2" fill="#1a140e"/>
  <!-- 前輪 -->
  <rect x="24" y="16" width="8" height="8" fill="#1a140e"/>
  <rect x="26" y="18" width="4" height="4" fill="#8d8d93"/>
  <rect x="27" y="19" width="2" height="2" fill="#1a140e"/>
  <!-- 車体フレーム -->
  <rect x="6" y="14" width="22" height="3" fill="#26201a"/>
  <rect x="9" y="12" width="8" height="3" fill="#1a140e"/>
  <!-- タンク -->
  <rect x="16" y="11" width="7" height="3" fill="#26201a"/>
  <rect x="17" y="12" width="4" height="1" fill="#f96410"/>
  <!-- マフラー -->
  <rect x="4" y="15" width="12" height="1" fill="#c9c9cf"/>
  <!-- ハンドル -->
  <rect x="24" y="8" width="1" height="4" fill="#8d8d93"/>
  <rect x="23" y="8" width="3" height="1" fill="#1a140e"/>
  <!-- ヘッドライト -->
  <rect x="26" y="12" width="3" height="3" fill="#c9c9cf"/>
  <rect x="27" y="13" width="2" height="1" fill="#fff6c9"/>
  <!-- 脚(ジーンズ) -->
  <rect x="13" y="11" width="4" height="4" fill="#2b4bb5"/>
  <rect x="12" y="14" width="3" height="2" fill="#2b4bb5"/>
  <!-- ブーツ -->
  <rect x="11" y="16" width="4" height="2" fill="#3a3026"/>
  <!-- 胴体(グレーのジャケット) -->
  <rect x="13" y="5" width="6" height="7" fill="#6e737c"/>
  <rect x="14" y="6" width="2" height="4" fill="#22201e"/>
  <!-- 腕 -->
  <rect x="18" y="6" width="5" height="2" fill="#6e737c"/>
  <rect x="22" y="7" width="2" height="2" fill="#f2c9a0"/>
  <!-- 頭 -->
  <rect x="13" y="0" width="6" height="5" fill="#f2c9a0"/>
  <!-- 髪 -->
  <rect x="12" y="0" width="7" height="2" fill="#17130f"/>
  <rect x="12" y="1" width="2" height="3" fill="#17130f"/>
  <!-- メガネ -->
  <rect x="14" y="2" width="5" height="1" fill="#17130f"/>
  <rect x="15" y="3" width="1" height="1" fill="#17130f"/>
  <rect x="17" y="3" width="1" height="1" fill="#17130f"/>
</svg>
